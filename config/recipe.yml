# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering & Security Workstation
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 44

modules:
  - type: copr
    enable:
      - nett00n/hyprland      # Essential for Hyprland & Waybar
      - chronoscrat/starship  # For your shell prompt
      - nickavem/keyd         # For your Caps Lock -> Control mapping

  - type: rpm-ostree
    install:
      # --- Desktop & Terminal ---
      - hyprland
      - foot
      - waybar
      - wofi
      - hyprpaper
      - xdg-desktop-portal-hyprland
      
      # --- Hardware & Drivers ---
      - libva-nvidia-driver   # Corrected name
      - akmod-v4l2loopback    # Corrected name for atomic systems
      - keyd
      
      # --- Shell & Core Workflow ---
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - neovim
      - tmux
      - stow
      
      # --- Development & Cloud ---
      - golang
      - gcc
      - gcc-c++
      - make
      - python3
      - python3-pip
      - awscli
      - kubernetes-client
      - helm
      
      # --- Security & Modern CLI ---
      - nmap
      - tcpdump
      - eza
      - bat
      - zoxide
      - ripgrep
      - fd-find               # Corrected name
      - starship
      - fzf
      - just
      - distrobox

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
          - com.obsproject.Studio
          - org.gnome.Ptyxis
          - org.gnome.Extensions.GSConnect

  - type: script
    scripts:
      - setup-zsh.sh
