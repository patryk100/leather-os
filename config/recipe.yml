# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering Station
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - atim/starship
        - alternateved/keyd
    install:
      packages:
        # --- Core Workflow ---
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - neovim
        - stow
        # --- Modern CLI ---
        - eza
        - bat
        - zoxide
        - ripgrep
        - fd-find
        - starship
        - wl-clipboard
    # Tiling (small, unlikely to fail)
  - type: dnf
    install:
      packages:
        - hyprland
        - foot
        - waybar
        - wofi
        - hyprpaper
        - xdg-desktop-portal-hyprland

  # Dev tools (large)
  - type: dnf
    install:
      packages:
        - golang
        - gcc
        - gcc-c++
        - make
        - python3
        - python3-pip
        - awscli
        - kubernetes-client
        - helm

  # The suspects - isolate these
  - type: dnf
    install:
      skip-broken: true
      packages:
        - libva-nvidia-driver

  - type: dnf
    install:
      skip-broken: true
      packages:
        - akmod-v4l2loopback

  - type: dnf
    install:
      skip-broken: true
      packages:
        - keyd

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
