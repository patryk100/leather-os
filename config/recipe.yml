# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 HWE Engineering Station
base-image: ghcr.io/ublue-os/hwe/silverblue-nvidia
image-version: 43

modules:
  - type: rpm-ostree
    install:
      # --- Desktop & Terminal ---
      - hyprland
      - foot
      - waybar
      - wofi
      - hyprpaper
      - xdg-desktop-portal-hyprland
      
      # --- Hardware & Drivers ---
      - libva-nvidia-driver
      - akmod-v4l2loopback
      - keyd                 # Now in official Fedora 43 repos!
      
      # --- Shell & Core Workflow ---
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - neovim
      - tmux
      - stow
      
      # --- Dev, Security & CLI ---
      - golang
      - gcc
      - gcc-c++
      - make
      - python3
      - python3-pip
      - awscli
      - kubernetes-client
      - helm
      - nmap
      - tcpdump
      - eza
      - bat
      - zoxide
      - ripgrep
      - fd-find
      - starship             # Now in official Fedora 43 repos!
      - fzf
      - just
      - distrobox

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
          - com.obsproject.Studio
          - org.gnome.Ptyxis
          - org.gnome.Extensions.GSConnect

  - type: script
    scripts:
      - setup-zsh.sh
