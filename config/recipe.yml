name: leather-os
description: RTX 3070/Ryzen 9 Engineering & Security Workstation
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 44 # Or 'latest'. Use '40' or '41' to match current Fedora versions.

modules:
  - type: rpm-ostree
    install:
      # --- Desktop & Terminal ---
      - hyprland
      - foot
      - waybar
      - wofi
      - hyprpaper
      - xdg-desktop-portal-hyprland
      
      # --- Hardware & Drivers ---
      - libva-nvidia-driver
      - v4l2loopback
      - keyd
      
      # --- Shell & Core Workflow ---
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - neovim
      - tmux
      - stow
      
      # --- Dev & Cloud (Moved back here for base image stability) ---
      - golang
      - gcc
      - gcc-c++
      - make
      - python3
      - python3-pip
      - awscli2
      - kubernetes-client
      - helm
      
      # --- Security & Modern CLI ---
      - nmap
      - tcpdump
      - eza
      - bat
      - zoxide
      - ripgrep
      - fd
      - starship
      - fzf
      - just
      - distrobox

  - type: brew
    # The brew module now handles its own internal logic. 
    # You run 'brew install' in your terminal after booting.

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
          - com.obsproject.Studio
          - org.gnome.Ptyxis
          - org.gnome.Extensions.GSConnect

  - type: script
    scripts:
      - setup-zsh.sh
