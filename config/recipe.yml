# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering Station
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - atim/starship
        - alternateved/keyd
        - solopasha/hyprland
    install:
      packages:
        # --- Core Workflow ---
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - neovim
        - stow
        # --- Modern CLI ---
        - eza
        - bat
        - zoxide
        - ripgrep
        - fd-find
        - starship
        - wl-clipboard
        - jq
        - yq
        - gh
        - htop
        - btop

  # Tiling — Hyprland from solopasha/hyprland COPR
  - type: dnf
    install:
      packages:
        - hyprland
        - hyprpaper
        - xdg-desktop-portal-hyprland
        - foot
        - waybar
        - wofi

  # Dev tools (large)
  - type: dnf
    install:
      packages:
        - golang
        - gcc
        - gcc-c++
        - make
        - python3
        - python3-pip
        - awscli

  # Container & virtualization stack
  - type: dnf
    install:
      packages:
        - podman-compose
        - buildah
        - skopeo
        - virt-manager
        - libvirt

  # NVIDIA VAAPI
  - type: dnf
    install:
      skip-broken: true
      packages:
        - libva-nvidia-driver

  # Kernel modules — uses ublue-os/akmods pre-built RPMs instead of building locally
  - type: akmods
    install:
      - v4l2loopback

  # keyd — isolated due to sysusers scriptlet quirks
  - type: dnf
    install:
      skip-broken: true
      packages:
        - keyd

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
