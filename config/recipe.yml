# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering Station
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - atim/starship
        - alternateved/keyd
    install:
      packages:
        # --- Core Workflow ---
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - neovim
        - tmux
        - stow
        # --- Modern CLI ---
        - eza
        - bat
        - zoxide
        - ripgrep
        - fd-find
        - starship
        - fzf
        - just
        - distrobox
        - wl-clipboard

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
