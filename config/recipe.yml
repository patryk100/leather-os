# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering Station
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - atim/starship
        - alternateved/keyd
        - nett00n/hyprland
    install:
      skip-unavailable: true
      skip-broken: true
      packages:
        # --- Tiling Environment ---
        - hyprland
        - foot
        - waybar
        - wofi
        - hyprpaper
        - xdg-desktop-portal-hyprland
        - wl-clipboard

        # --- Drivers & Kernel ---
        - libva-nvidia-driver
        - akmod-v4l2loopback

        # --- Core Workflow ---
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - neovim
        - tmux
        - stow

        # --- Dev & Cloud ---
        - golang
        - gcc
        - gcc-c++
        - make
        - python3
        - python3-pip
        - awscli
        - kubernetes-client
        - helm

        # --- Modern CLI ---
        - eza
        - bat
        - zoxide
        - ripgrep
        - fd-find
        - starship
        - fzf
        - just
        - distrobox

  # keyd installed separately so its scriptlet failure doesn't nuke the main transaction
  - type: dnf
    install:
      skip-broken: true
      packages:
        - keyd

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
          - com.obsproject.Studio
          - org.gnome.Ptyxis
          - org.gnome.Extensions.GSConnect

  - type: script
    scripts:
      - setup-zsh.sh
