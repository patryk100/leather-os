# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering Station
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - atim/starship
        - alternateved/keyd
        - solopasha/hyprland
        - brycensranch/gpu-screen-recorder-git
    install:
      packages:
        # --- Core Workflow ---
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - neovim
        - stow
        # --- Modern CLI (used daily, every shell) ---
        - eza
        - bat
        - zoxide
        - ripgrep
        - fd-find
        - starship
        - fzf
        - wl-clipboard
        - jq
        - yq
        - gh
        # --- System monitoring (needs real host view) ---
        - htop
        - btop
        - ddcutil
        - i2c-tools

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono
        - FiraCode
        - Hack
  # Tiling — Hyprland from solopasha/hyprland COPR
  - type: dnf
    install:
      packages:
        - hyprland
        - hyprland-qtutils
        - hyprpaper
        - hyprlock
        # - mako
        - gpu-screen-recorder
        - xdg-desktop-portal-hyprland
        - foot
        - waybar
        - wofi
        - pavucontrol
        - wlogout
        - network-manager-applet

  # Container & virtualization stack
  # podman is in the base image; adding the ergonomic extras
  - type: dnf
    install:
      packages:
        - podman-compose
        - buildah
        - skopeo
        - virt-manager
        - libvirt

  # NVIDIA VAAPI
  - type: dnf
    install:
      skip-broken: true
      packages:
        - libva-nvidia-driver

  # Kernel modules — pre-built from ublue-os/akmods
  - type: akmods
    install:
      - v4l2loopback

  # keyd — isolated due to sysusers scriptlet quirks
  - type: dnf
    install:
      skip-broken: true
      packages:
        - keyd

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
