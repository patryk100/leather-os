# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leather-os
description: RTX 3070/Ryzen 9 Engineering Station
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 44

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - atim/starship
        - alternateved/keyd
        # hyprland COPR removed - now using official Fedora 44 repos
        - brycensranch/gpu-screen-recorder-git
    install:
      packages:
        # --- Core Workflow ---
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - neovim
        - stow
        # --- Modern CLI ---
        - eza
        - bat
        - zoxide
        - ripgrep
        - fd-find
        - starship
        - fzf
        - wl-clipboard
        - jq
        - yq
        - gh
        # --- System monitoring ---
        - htop
        - btop
        - ddcutil
        - i2c-tools

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono
        - FiraCode
        - Hack

  # Tiling — Hyprland (Now from official Fedora 44 repos)
  - type: dnf
    install:
      packages:
        - hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - mako
        - gpu-screen-recorder
        - xdg-desktop-portal-hyprland
        - foot
        - waybar
        - wofi
        - pavucontrol
        - wlogout
        - network-manager-applet
        - qt6-qtwayland # Added for better Hyprland compatibility

  # Container & virtualization stack
  - type: dnf
    install:
      packages:
        - podman-compose
        - buildah
        - skopeo
        - virt-manager
        - libvirt

  # NVIDIA VAAPI
  - type: dnf
    install:
      skip-broken: true
      packages:
        - libva-nvidia-driver

  # Kernel modules
  - type: akmods
    install:
      - v4l2loopback

  # keyd — isolated for stability
  - type: dnf
    install:
      skip-broken: true
      packages:
        - keyd

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.mozilla.firefox
          - md.obsidian.Obsidian
          - io.mpv.Mpv           
          - org.kde.okular
